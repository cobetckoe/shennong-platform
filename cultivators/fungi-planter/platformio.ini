; PlatformIO 项目配置 - 菌类种植机

[platformio]
default_envs = stm32

[env:stm32]
platform = ststm32
board = bluepill_f103c8
framework = arduino
monitor_speed = 115200
upload_speed = 115200

build_flags =
  -DDEVICE_TYPE=0x05
  -DNODE_ID=0x15
  -DSENSOR_INTERVAL=5000
  -Wall

lib_deps =
  ArduinoJson

lib_extra_dirs =
  ../../shared/lib

[env:debug]
extends = stm32
build_flags =
  -DDEBUG=1
  -DDEVICE_TYPE=0x05
  -DNODE_ID=0x15
  -Wall -Wextra -g

[env:release]
extends = stm32
build_flags =
  -O2
  -DNDEBUG
  -DDEVICE_TYPE=0x05
  -DNODE_ID=0x15