; PlatformIO 项目配置 - 块茎种植机

[platformio]
default_envs = stm32

[env:stm32]
platform = ststm32
board = bluepill_f103c8
framework = arduino
monitor_speed = 115200
upload_speed = 115200

build_flags =
  -DDEVICE_TYPE=0x02
  -DNODE_ID=0x12
  -DSENSOR_INTERVAL=5000
  -Wall

lib_deps =
  ArduinoJson

lib_extra_dirs =
  ../../shared/lib