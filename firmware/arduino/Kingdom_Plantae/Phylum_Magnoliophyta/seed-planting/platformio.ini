; PlatformIO 项目配置 - 神农平台 Arduino 设备 (seed-planting)

[platformio]
default_envs = esp32

[env:esp32]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags = 
    -DDEVICE_TYPE=1        ; 设备类型 (1=种植机)
    -DNODE_ID=0x10         ; Mesh 节点 ID
    -DSENSOR_INTERVAL=5000 ; 采集间隔 (ms)
    -Wall

lib_deps =
    arduino-mqtt/Arduino MQTT Client Library
    ArduinoJson
    Wire

src_filter = +<*> -<.git/> -<.pio>
include_dir = include
