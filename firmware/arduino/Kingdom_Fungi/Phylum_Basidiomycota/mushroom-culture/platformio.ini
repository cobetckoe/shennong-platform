[platformio]
default_envs = esp32

[env:esp32]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags =
  -DDEVICE_TYPE=0x05
  -DNODE_ID=0x15
  -DSENSOR_INTERVAL=5000
  -Wall

lib_deps =
  ArduinoJson

src_filter = +<*> -<.git/> -<.pio>
include_dir = include

[env:debug]
extends = esp32
build_flags =
  -DDEBUG=1
  -DDEVICE_TYPE=0x05
  -DNODE_ID=0x15
  -Wall -Wextra -g

[env:release]
extends = esp32
build_flags =
  -O2
  -DNDEBUG
  -DDEVICE_TYPE=0x05
  -DNODE_ID=0x15
